{% extends 'base.html' %}
{% block title %}PI-SAÚDE / Medicamentos{% endblock %}

{% block content %}
<!-- {% include 'navbar.html' %} -->

<h2>Gestão de Medicamentos</h2>

<!-- Botão Novo Medicamento -->
<div class="d-flex justify-content-end mb-3">
    <button class="btn btn-success" onclick="abrirModalNovo()">
        <i class="bi bi-plus-circle"></i> Novo Medicamento
    </button>
</div>

<!-- Tabela de Medicamentos -->
<div class="card">
    <div class="card-header">
        <h5 class="card-title mb-0">
            <i class="bi bi-capsule"></i> Lista de Medicamentos
        </h5>
    </div>
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle" id="medicamentosTable">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome Padronizado</th>
                        <th>Categoria</th>
                        <th>Forma Farmacêutica</th>
                        <th>Unidade Medida</th>
                        <th>Apresentação</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="medicamentosTableBody">
                    <tr>
                        <td colspan="8" class="text-center text-muted">
                            <i class="bi bi-hourglass-split"></i> Carregando medicamentos...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal para Criar/Editar Medicamento -->
<div class="modal fade" id="medicamentoModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <form id="medicamentoForm" class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Novo Medicamento</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="medicamentoId">

                <div class="row">
                    <div class="col-md-12 mb-3">
                        <label class="form-label">Nome Padronizado *</label>
                        <input type="text" id="nome_padronizado" class="form-control" required
                               placeholder="Ex: Tenofovir 300mg + Lamivudina 300mg + Dolutegravir 50mg">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoria *</label>
                        <select id="categoria" class="form-select" required>
                            <option value="">Selecione</option>
                            <option value="TARV">TARV</option>
                            <option value="PrEP">PrEP</option>
                            <option value="TB Sensível">TB Sensível</option>
                            <option value="TB-DR">TB-DR</option>
                            <option value="Profilaxia">Profilaxia</option>
                            <option value="Testes Rápidos">Testes Rápidos</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Forma Farmacêutica *</label>
                        <select id="forma_farmaceutica" class="form-select" required>
                            <option value="">Selecione</option>
                            <option value="Comprimido">Comprimido</option>
                            <option value="Suspensão">Suspensão</option>
                            <option value="Kit">Kit</option>
                            <option value="Frasco">Frasco</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Unidade de Medida *</label>
                        <select id="unidade_medida" class="form-select" required>
                            <option value="">Selecione</option>
                            <option value="Comprimido">Comprimido</option>
                            <option value="Frasco">Frasco</option>
                            <option value="Kit">Kit</option>
                            <option value="ml">ml</option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Apresentação *</label>
                        <input type="text" id="apresentacao" class="form-control" required
                               placeholder="Ex: 90 comp, 100 ml, Kit">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Ativo</label>
                        <select id="ativo" class="form-select">
                            <option value="true">Sim</option>
                            <option value="false">Não</option>
                        </select>
                    </div>
                </div>

                <!-- Campos de controlo (opcionais, podem ser omitidos ou mantidos ocultos) -->
                <hr>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sync Status</label>
                        <input type="text" id="syncStatus" class="form-control" value="Not Syncronized" readonly>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Sync Status Date</label>
                        <input type="text" id="syncStatusDate" class="form-control" readonly>
                    </div>
                </div>
            </div>

            <div class="modal-footer">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<style>
    /* Ajustes de estilo, se necessário */
    .table th {
        background-color: #000 !important;
        color: #fff !important;
    }
</style>

<script>
    // Variáveis globais
    let allMedicamentos = [];
    const apiUrl = '/api/medicamento';  // Ajuste conforme seu blueprint

    // Carregar medicamentos ao iniciar
    window.onload = function() {
        loadMedicamentos();
    };

    // Buscar todos os medicamentos
    async function loadMedicamentos() {
        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error('Erro ao carregar medicamentos');
            allMedicamentos = await response.json();
            renderizarTabela();
        } catch (err) {
            console.error(err);
            document.getElementById('medicamentosTableBody').innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-danger">
                        <i class="bi bi-exclamation-triangle"></i> Erro ao carregar medicamentos.
                    </td>
                </tr>
            `;
        }
    }

    // Renderizar tabela com os medicamentos
    function renderizarTabela() {
        const tbody = document.getElementById('medicamentosTableBody');
        if (!allMedicamentos || allMedicamentos.length === 0) {
            tbody.innerHTML = `
                <tr>
                    <td colspan="8" class="text-center text-muted">
                        Nenhum medicamento cadastrado.
                    </td>
                </tr>
            `;
            return;
        }

        tbody.innerHTML = '';
        allMedicamentos.forEach(med => {
            const ativo = med.ativo ? '<span class="badge bg-success">Sim</span>' : '<span class="badge bg-danger">Não</span>';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${med.id}</td>
                <td>${med.nome_padronizado}</td>
                <td>${med.categoria}</td>
                <td>${med.forma_farmaceutica}</td>
                <td>${med.unidade_medida}</td>
                <td>${med.apresentacao}</td>
                <td class="text-center">${ativo}</td>
                <td>
                    <button class="btn btn-sm btn-warning me-1" onclick="editarMedicamento(${med.id})" title="Editar">
                        <i class="bi bi-pencil-square"></i>
                    </button>
                    <button class="btn btn-sm btn-info me-1" onclick="gerirStocksMedicamento(${med.id})" title="Configurar stocks por localização">
                        <i class="bi bi-gear"></i>
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="eliminarMedicamento(${med.id})" title="Apagar">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Abrir modal para novo medicamento
    function abrirModalNovo() {
        document.getElementById('medicamentoForm').reset();
        document.getElementById('medicamentoId').value = '';
        document.getElementById('modalTitle').innerText = 'Novo Medicamento';
        // Limpar campos de controlo
        document.getElementById('syncStatus').value = 'Not Syncronized';
        document.getElementById('syncStatusDate').value = '';
        // Definir valores padrão
        document.getElementById('ativo').value = 'true';
        
        new bootstrap.Modal(document.getElementById('medicamentoModal')).show();
    }

    // Abrir modal para edição
    async function editarMedicamento(id) {
        try {
            // Buscar dados completos do medicamento (pode vir de allMedicamentos ou nova requisição)
            const med = allMedicamentos.find(m => m.id === id);
            if (!med) throw new Error('Medicamento não encontrado');

            document.getElementById('medicamentoId').value = med.id;
            document.getElementById('nome_padronizado').value = med.nome_padronizado || '';
            document.getElementById('categoria').value = med.categoria || '';
            document.getElementById('forma_farmaceutica').value = med.forma_farmaceutica || '';
            document.getElementById('unidade_medida').value = med.unidade_medida || '';
            document.getElementById('apresentacao').value = med.apresentacao || '';
            document.getElementById('ativo').value = med.ativo ? 'true' : 'false';
            document.getElementById('syncStatus').value = med.syncStatus || 'Not Syncronized';
            document.getElementById('syncStatusDate').value = med.syncStatusDate ? med.syncStatusDate.slice(0,16) : '';

            document.getElementById('modalTitle').innerText = 'Editar Medicamento';
            new bootstrap.Modal(document.getElementById('medicamentoModal')).show();
        } catch (err) {
            alert('Erro ao carregar dados do medicamento: ' + err.message);
        }
    }

    // Submeter formulário (criar ou atualizar)
    document.getElementById('medicamentoForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const id = document.getElementById('medicamentoId').value;
        const payload = {
            nome_padronizado: document.getElementById('nome_padronizado').value.trim(),
            categoria: document.getElementById('categoria').value,
            forma_farmaceutica: document.getElementById('forma_farmaceutica').value,
            unidade_medida: document.getElementById('unidade_medida').value,
            apresentacao: document.getElementById('apresentacao').value.trim(),
            ativo: document.getElementById('ativo').value === 'true',
            syncStatus: document.getElementById('syncStatus').value,
            syncStatusDate: document.getElementById('syncStatusDate').value || null
        };

        // Validação rápida
        if (!payload.nome_padronizado || !payload.categoria || !payload.forma_farmaceutica || 
            !payload.unidade_medida || !payload.apresentacao) {
            alert('Preencha todos os campos obrigatórios.');
            return;
        }

        try {
            const url = id ? `${apiUrl}/${id}` : apiUrl;
            const method = id ? 'PUT' : 'POST';
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const responseData = await response.json();

            if (!response.ok) {
                // Se houver erro de duplicidade (409) ou outros
                throw new Error(responseData.message || 'Erro ao salvar medicamento');
            }

            // Fechar modal e recarregar lista
            bootstrap.Modal.getInstance(document.getElementById('medicamentoModal')).hide();
            await loadMedicamentos();
            alert(id ? 'Medicamento atualizado!' : 'Medicamento criado!');
        } catch (err) {
            alert('Erro: ' + err.message);
        }
    });

    // Eliminar medicamento
    async function eliminarMedicamento(id) {
        if (!confirm('Tem certeza que deseja apagar este medicamento?')) return;
        try {
            const response = await fetch(`${apiUrl}/${id}`, { method: 'DELETE' });
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || 'Erro ao apagar');
            }
            await loadMedicamentos();
            alert('Medicamento apagado com sucesso!');
        } catch (err) {
            alert('Erro: ' + err.message);
        }
    }

    // Filtro de pesquisa (opcional) - se quiser adicionar um campo de pesquisa
    function filtrarMedicamentos(termo) {
        const term = termo.toLowerCase();
        const linhas = document.querySelectorAll('#medicamentosTableBody tr');
        linhas.forEach(linha => {
            const texto = linha.innerText.toLowerCase();
            linha.style.display = texto.includes(term) ? '' : 'none';
        });
    }

    // ====== GESTÃO DE STOCKS POR LOCALIZAÇÃO ======

    async function gerirStocksMedicamento(medicamentoId) {
        const medicamento = allMedicamentos.find(m => m.id === medicamentoId);
        if (!medicamento) {
            alert('Medicamento não encontrado');
            return;
        }

        try {
            // Carregar lista de localizações
            const locResponse = await fetch('/api/location');
            if (!locResponse.ok) throw new Error('Erro ao carregar localizações');
            const locations = await locResponse.json();

            // Carregar configurações atuais para este medicamento
            const configResponse = await fetch(`/api/medicamento-location/medicamento/${medicamentoId}`);
            let configuracoes = [];
            if (configResponse.ok) {
                configuracoes = await configResponse.json();
            } else if (configResponse.status !== 404) {
                const err = await configResponse.json();
                throw new Error(err.message || 'Erro ao carregar configurações');
            }

            const configMap = {};
            configuracoes.forEach(cfg => {
                configMap[cfg.location_id] = cfg;
            });

            // Construir modal
            const modalHtml = `
                <div class="modal fade" id="stocksModal" tabindex="-1" aria-hidden="true">
                    <div class="modal-dialog modal-lg">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h5 class="modal-title">Configurar Stocks - ${medicamento.nome_padronizado} (${medicamento.apresentacao})</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                            </div>
                            <div class="modal-body">
                                <p>Defina os stocks mínimo e máximo para cada unidade sanitária.</p>
                                <div class="table-responsive">
                                    <table class="table table-bordered">
                                        <thead>
                                            <tr>
                                                <th>Unidade Sanitária</th>
                                                <th>Stock Mínimo</th>
                                                <th>Stock Máximo</th>
                                            </tr>
                                        </thead>
                                        <tbody id="stocksTableBody">
                                            ${locations.map(loc => {
                                                const cfg = configMap[loc.id] || { stock_minimo: 0, stock_maximo: 0 };
                                                return `
                                                    <tr data-location-id="${loc.id}">
                                                        <td>${loc.name}</td>
                                                        <td>
                                                            <input type="number" class="form-control stock-minimo" value="${cfg.stock_minimo}" min="0">
                                                        </td>
                                                        <td>
                                                            <input type="number" class="form-control stock-maximo" value="${cfg.stock_maximo}" min="0">
                                                        </td>
                                                    </tr>
                                                `;
                                            }).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button type="button" class="btn btn-primary" onclick="salvarStocksMedicamento(${medicamentoId})">Salvar</button>
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            // Remover modal antigo se existir
            const oldModal = document.getElementById('stocksModal');
            if (oldModal) oldModal.remove();

            document.body.insertAdjacentHTML('beforeend', modalHtml);
            const modal = new bootstrap.Modal(document.getElementById('stocksModal'));
            modal.show();

            document.getElementById('stocksModal').addEventListener('hidden.bs.modal', function () {
                this.remove();
            });

        } catch (err) {
            alert('Erro: ' + err.message);
        }
    }

    async function salvarStocksMedicamento(medicamentoId) {
        const linhas = document.querySelectorAll('#stocksTableBody tr');
        const dados = [];

        linhas.forEach(linha => {
            const locationId = linha.dataset.locationId;
            const stockMinimo = parseInt(linha.querySelector('.stock-minimo').value, 10) || 0;
            const stockMaximo = parseInt(linha.querySelector('.stock-maximo').value, 10) || 0;
            if (stockMinimo >= 0 && stockMaximo >= 0) {
                dados.push({
                    location_id: locationId,
                    stock_minimo: stockMinimo,
                    stock_maximo: stockMaximo
                });
            }
        });

        try {
            const response = await fetch(`/api/medicamento-location/medicamento/${medicamentoId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dados)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || 'Erro ao salvar');
            }

            bootstrap.Modal.getInstance(document.getElementById('stocksModal')).hide();
            alert('Configurações salvas com sucesso!');
        } catch (err) {
            alert('Erro: ' + err.message);
        }
    }
</script>

{% endblock %}
